<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBuy.com | Pro Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-logo">SBuy<span>.com</span></div>
            
            <div class="nav-search">
                <input placeholder="Search SBuy..." class="search-input">
                <div class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
            </div>

            <div class="nav-tools">
                <div class="nav-item" onclick="openLogin()">
                    <p>Hello, <span id="user-display">Sign in</span></p>
                </div>
                <div class="nav-cart" onclick="toggleCart()">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-msg">
            <p>Welcome to SBuy! Huge discounts on Gaming Laptops & Gadgets.</p>
        </div>
    </section>

    <main class="shop-section" id="product-container"></main>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLogin()">&times;</span>
            <h2>Sign-In to SBuy</h2>
            <input type="email" id="email" placeholder="Email or Phone">
            <input type="password" id="password" placeholder="Password">
            <button class="login-btn" onclick="handleLogin()">Continue</button>
            <p style="font-size: 12px; margin-top: 10px;">By continuing, you agree to SBuy's Conditions of Use.</p>
        </div>
    </div>

    <div id="cart-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Your Cart</h3>
            <button onclick="toggleCart()">X</button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <h4>Total: $<span id="total-price">0</span></h4>
            <div id="payment-area" style="display:none;">
                <h3>Payment Details</h3>
                <input type="text" placeholder="Card Number">
                <div style="display: flex; gap: 5px;">
                    <input type="text" placeholder="MM/YY">
                    <input type="text" placeholder="CVV">
                </div>
                <button class="pay-btn" onclick="processPayment()">Pay Now</button>
            </div>
            <button id="checkout-btn" class="checkout-btn" onclick="showPayment()">Proceed to Checkout</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
